<body>
    <section id="landing">
        <nav class="nav" >

            <div class="nav__logo">
                <img class="nav__logo--img" src="./assets/logo.2c489fc453a1783cbadacf914efa3df6.svg" alt="logo">
                <div class="nav__logo--title">Treact</div>
            </div>
            <div class="nav__links">
                <a href="#about" class="nav__link">About</a>
                <a href="#blog" class="nav__link">Blog</a>
                <a href="#pricing" class="nav__link">Pricing</a>
                <a href="#contact__us" class="nav__link">Contact Us</a>
                <a href="#login "class="nav__link login">Login</a>

                <a href="#">
                    <button class="nav__link nav__link--primary">Sign Up</button>
                  </a>
            </div>
            <button class="btn__menu" onclick="openMenu()">

            </button>

           </div>
        </nav>
        <div class="modal">
            <button class ="btn__menu btn__menu--close" onclick="closeMenu()">
            </button>
            <div class="modal__links">
            <a class="modal__link" href="#">About</a>
            <a class="modal__link" href="#">Blog</a>
            <a class="modal__link" href="#">Pricing</a>

        </div>
        </div>
        <header>
            <div class="container">
                <div class="row">
                    <div class="header__description">

                    <div class="header__email">
                        <input type="text" class="header__email--input" placeholder="Your E-mail Address">

                    </div>
                    <p class="header__customers--title">OUR TRUSTED CUSTOMERS</p>
                    <img src="./assets/customers-logo-strip.680ac7c2e8ae28161d2c.png" class="header__customers">
                    </div>
                    <figure class="header__img--wrapper">
                        <img src="/assets/design-illustration-2.6da6a00b20c07c4a9b65d1870679e1b8.svg" class="header__img">
                    </figure>

                </div>

            </div>

<main>
    <section id="features">
        <div class="container">
